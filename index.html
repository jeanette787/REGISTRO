<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Académico</title>
<link rel="stylesheet" href="estilo.css">
<header class="header">
        <div class="logo">
            <img src="Logo.png">
        </div>

        <h1 class="titulo">EDUNOVA Educaci&oacute;n en L&iacute;nea para tu Futuro</h1>
    </header>
<style>
body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#bce9ff;
margin:0;
}
.header {
    background-color: #00264e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 30px 0;
}

/* LOGO A LA IZQUIERDA */
.logo {
    position: absolute;
    left: 30px;
    display: flex;
    align-items: center;
}

.logo img {
    height: 100px;
    width: 95px;
}

/* TÍTULO CENTRADO */
.titulo {
    font-size:25px;
    font-weight: bold;
    margin: 0;
}
.contenedor{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
}

/* TARJETA */
.tarjeta{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
width: 300px;
}

.tarjeta img{
width:100%;
border-radius:10px;
}

/* FORMULARIO */
.pedido{
width:350px;
}

.pedido h2{
color:#2d71ca;
}

.sabores{
display:flex;
gap:10px;
margin:10px 0;
}

.sabores img{
width:90px;
border-radius:5px;
}

label{
display:block;
margin-top:10px;
}

input, select{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #05124b;
border-radius:3px;
}

/* Botón con efecto de palpitación */
.boton-palpita {
  background-color:  #002d68;
  border: none;
  color: white;
  padding: 12px 24px;
  font-size: 1em;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s ease-in-out, background-color 0.3s;
}

.boton-palpita:hover {
  animation: palpitar 1s infinite;
  background-color: #4ab7e6;
}

@keyframes palpitar {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #3399ff;
  border-radius: 5px;
  margin-bottom: 1em;
  box-sizing: border-box;
}
</style>
</head>
<body>

<div class="contenedor">

<!-- TARJETA IZQUIERDA -->
<div class="tarjeta">
<h2>🎓 Registro Acad&eacute;mico</h2>
<p>¡Tu camino empieza hoy! Reg&iacute;strate y da el primer paso hacia la carrera que quieres.</p>

<img src="op2.jpg">

</div>

<!-- FORMULARIO DERECHA -->
<div class="pedido">

    <h1><center>• Formulario •</center></h1>
    <p><center>Selecciona tu carrera y completa tus datos.</center></p>


<form id="miFormulario">

     <label for="Nombres"> Nombres</label>
    <input type="text"  id="Nombres" name="Nombres" required>

     <label for="Apellidos"> Apellidos</label>
    <input type="text"  id="Apellidos" name="Apellidos" required>

    <label for="Telefono"> Tel&eacute;fono</label>
    <input type="tel" id="Telefono" name="Telefono" required>

    <label for="Correo"> Correo</label>
    <input type="email" id="Correo"  name="Correo" required><br><br>

     <select id="Carrera" name="Carrera" required>
      <option value="">Selecciona tu carrera</option>
      <option value="Diseño Gráfico">Diseño Gráfico</option>
      <option value="Administración de Empresas">Administración de Empresas</option>
      <option value="Derecho">Derecho</option>
      <option value="Medicina">Medicina</option>
      <option value="Arquitectura">Arquitectura</option>
      
    </select><br><br>
   
    <button type="submit" class="boton-palpita">Enviar</button>
 </form>
 
 <p class="mensaje" id="mensaje"></p>


<script>

const url = "https://script.google.com/macros/s/AKfycbzpXNsCeZXuQebYMEksWl6qxMNL62s-ZGe2Ua5qaOlFozsPJDSeoCosA8Lrr8jL8a6glg/exec";

document.getElementById("miFormulario") 
.addEventListener("submit", function(e){

    e.preventDefault();

    const datos = {
        nombres: document.getElementById("Nombres").value,
        apellidos: document.getElementById("Apellidos").value,
        telefono: document.getElementById("Telefono").value,
        correo: document.getElementById("Correo").value,
        carrera: document.getElementById("Carrera").value,

    };

    fetch(url, {
        method: "POST",
        body: JSON.stringify(datos)
    })

    .then(res => res.json())
    .then(data => {
    document.getElementById("mensaje").innerHTML =
        "Datos guardados correctamente ✔️";
    document.getElementById("miFormulario").reset();
    })
    .catch(error => {
    document.getElementById("mensaje").innerHTML =
        "Error al guardar ❌";
    });

})

</script>

</div>

</div>

</body>
</html>
